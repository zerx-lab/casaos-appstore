# CasaOS / ZimaOS AppStore Source Protocol v2 模板
# 规范来源：IceWhaleTech/CasaOS-AppStore/docs/guides/third-party-store-guide.md
# 构建：python3 scripts/build_appstore.py --source . --output dist --base-url <cdn>
name: fluxdown
services:
  fluxdown-server:
    # 规则：禁止使用 latest，须钉具体版本。发布新版时同步更新此处与 x-casaos.version。
    image: ghcr.io/zerx-lab/fluxdown-server:0.1.54
    container_name: fluxdown-server
    restart: unless-stopped
    ports:
      - target: 17800
        published: "17800"
        protocol: tcp
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/data
        target: /data
      - type: bind
        source: /DATA/Downloads
        target: /root/Downloads
    environment:
      TZ: $TZ
    # 可选：接外部 PostgreSQL
    # FLUXDOWN_DATABASE_URL: postgres://user:pass@host:5432/fluxdown
x-casaos:
  app_id: dev.zerx.fluxdown
  # --- Access entry ---
  main: fluxdown-server
  index: /
  port_map: "17800"
  scheme: http
  # --- Display ---
  title:
    en_US: FluxDown
    zh_CN: FluxDown
  icon: https://cdn.jsdelivr.net/gh/zerx-lab/FluxDown@main/assets/logo/fluxdown_logo.svg
  tagline:
    en_US: Downloads, Supercharged.
    zh_CN: 下载，全面加速。
  description:
    en_US: >-
      A blazing fast, multi-protocol download manager powered by a Rust engine.
      HTTP/HTTPS/FTP/BitTorrent/HLS with intelligent segmentation, resume, speed
      control, browser extension, aria2-compatible JSON-RPC and an MCP endpoint.
      (alternative to Internet Download Manager, aria2)
    zh_CN: >-
      Rust 引擎驱动的高速多协议下载管理器。支持 HTTP/HTTPS/FTP/BitTorrent/HLS，
      智能分段、断点续传、限速、浏览器扩展，兼容 aria2 JSON-RPC 并内置 MCP 端点。
  tips:
    before_install:
      en_US: >-
        First launch generates an admin token printed once in the container log:
        `docker logs fluxdown-server 2>&1 | grep -i token`. The management API and
        MCP endpoint require this token.
      zh_CN: >-
        首次启动会在容器日志打印一次性管理 token：
        `docker logs fluxdown-server 2>&1 | grep -i token`。管理 API 与 MCP 端点需要此 token。
  # --- Metadata ---
  author: zerx-lab
  developer: zerx-lab
  category: Downloader
  architectures:
    - amd64
  # --- Version ---
  version: "0.1.54"
  update_at: "2026-07-04"
  release_notes:
    en_US: See https://github.com/zerx-lab/FluxDown/releases
    zh_CN: 见 https://github.com/zerx-lab/FluxDown/releases
  # --- Links ---
  website: https://fluxdown.zerx.dev
  repo: https://github.com/zerx-lab/FluxDown
  support: https://github.com/zerx-lab/FluxDown/issues
  docs: https://fluxdown.zerx.dev
